<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#003087">
    <title>ProfitPrint</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003087' width='100' height='100' rx='22'/><text x='50' y='62' font-size='42' font-weight='800' fill='white' text-anchor='middle' font-family='system-ui'>PP</text></svg>">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <section id="screen-login" class="screen active">
            <div class="login-bg"></div>
            <div class="login-content">
                <div class="login-logo">
                    <span class="logo-icon">PP</span>
                    <h1>ProfitPrint</h1>
                    <p>PROFITPRINT2024 · Наманган</p>
                </div>
                <form id="login-form" class="login-form" autocomplete="on">
                    <div class="input-group">
                        <label for="login-input">Логин</label>
                        <input type="text" id="login-input" placeholder="Введите логин" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="password-input">Пароль</label>
                        <input type="password" id="password-input" placeholder="Введите пароль" autocomplete="current-password">
                    </div>
                    <p class="login-error" id="login-error"></p>
                    <button type="submit" class="btn-primary btn-full">Войти</button>
                </form>
                <p class="login-hint">Менеджер: Bekzod · Дизайнер: Diyor</p>
            </div>
        </section>

        <!-- Основное приложение -->
        <section id="screen-app" class="screen">
            <header class="app-header" id="app-header">
                <button class="header-btn" id="btn-back" hidden aria-label="Назад">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="header-title">
                    <h2 id="header-title">Главная</h2>
                    <span id="header-subtitle"></span>
                </div>
                <button class="header-btn" id="btn-theme" aria-label="Тема">
                    <span id="theme-icon">🌙</span>
                </button>
            </header>

            <main class="app-content" id="app-content"></main>

            <nav class="bottom-nav" id="bottom-nav"></nav>
        </section>

        <!-- Модальное окно -->
        <div class="modal-overlay" id="modal-overlay" hidden>
            <div class="modal-sheet" id="modal-sheet">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <h3 id="modal-title"></h3>
                    <button class="modal-close" id="modal-close" aria-label="Закрыть">✕</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer"></div>
            </div>
        </div>

        <!-- Toast уведомления -->
        <div class="toast-container" id="toast-container"></div>

        <!-- FAB -->
        <button class="fab" id="fab" hidden aria-label="Добавить">+</button>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="js/mobile-app.js"></script>
</body>
</html>
