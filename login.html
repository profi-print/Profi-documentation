<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrintMax — Вход</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-card">
    <div class="login-logo"><img src="printmax.jpg" alt="PrintMax"></div>
    <input type="text" id="loginInput" placeholder="Логин" autocomplete="username" inputmode="text">
    <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" id="btnLogin">Войти</button>
</div>

<script>
    function setTheme(mode) {
        document.body.className = mode;
        localStorage.setItem('theme', mode);
    }
    (function initTheme() {
        const saved = localStorage.getItem('theme') || 'light';
        setTheme(saved);
    })();

    const ACCOUNTS = [
        { login: 'Bekzod',     password: '0505',     role: 'manager'    },
        { login: 'Diyor',      password: 'diyorbek', role: 'designer'   },
        { login: 'Sklad',      password: '123',      role: 'warehouse'  },
        { login: 'Pechat',     password: '1234',     role: 'pechat'     },
        { login: 'Flotorezka', password: '1234',     role: 'flotorezka' },
        { login: 'STP',        password: '1234',     role: 'stp'        },
        { login: 'Vysechka',   password: '1234',     role: 'vysechka'   },
        { login: 'Tisnenie',   password: '1234',     role: 'tisnenie'   },
        { login: 'Kongrev',    password: '1234',     role: 'kongrev'    },
        { login: 'UFLak',      password: '1234',     role: 'uf_lak'     },
        { login: 'Rezka',      password: '1234',     role: 'rezka'      },
        { login: 'Skleyka',    password: '1234',     role: 'skleyka'    },
        { login: 'Laminaciya', password: '1234',     role: 'lamination' },
        { login: 'Tiska',      password: '1234',     role: 'tiska'      },
        { login: 'Ruchrab',    password: '1234',     role: 'manual_work'},
        { login: 'UdalenieO',  password: '1234',     role: 'obloj_remove'},
        { login: 'Otgruzka',   password: '1234',     role: 'sklad_otgruzka' }
    ];

    const ROLE_REDIRECT = {
        manager: 'index.html', designer: 'index2.html', warehouse: 'sklad.html',
        pechat: 'texKarta.html', flotorezka: 'texKarta.html', stp: 'texKarta.html',
        vysechka: 'texKarta.html', tisnenie: 'texKarta.html', kongrev: 'texKarta.html',
        uf_lak: 'texKarta.html', rezka: 'texKarta.html', skleyka: 'texKarta.html',
        lamination: 'texKarta.html', tiska: 'texKarta.html',
        manual_work: 'texKarta.html', obloj_remove: 'texKarta.html',
        sklad_otgruzka: 'texKarta.html'
    };

    const ROLE_OPERATORS = {
        flotorezka:     ['Зиёвиддин Ака'],
        stp:            ['Диёрбек'],
        rezka:          ['Бахриддин'],
        pechat:         ['Бекзод печатник', 'Тимур печатник', 'Аброр печатник'],
        uf_lak:         ['Жума бой'],
        tisnenie:       ['Алимардон'],
        lamination:     ['Эльдор'],
        kongrev:        ['Алимардон'],
        vysechka:       ['Алимардон'],
        obloj_remove:   ['Нортой'],
        manual_work:    ['Нигора'],
        skleyka:        ['Бахтиёр', 'Мухаммад'],
        sklad_otgruzka: ['Сафарали']
    };

    const loginInput = document.getElementById('loginInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const btnLogin = document.getElementById('btnLogin');

    function redirectForRole(role) {
        return ROLE_REDIRECT[role] || 'index.html';
    }

    function showOperatorSelection(role) {
        const operators = ROLE_OPERATORS[role];
        if (!operators) {
            window.location.href = redirectForRole(role);
            return;
        }
        document.body.innerHTML = `
            <div class="login-card">
                <h2>Выберите оператора</h2>
                <p>Станция: ${role}</p>
                <div id="opList">${operators.map(op => `<button class="btn-login" style="margin:6px 0;">${op}</button>`).join('')}</div>
            </div>
        `;
        document.querySelectorAll('#opList .btn-login').forEach(btn => {
            btn.addEventListener('click', function() {
                sessionStorage.setItem('profitprint_operator', this.textContent);
                window.location.href = redirectForRole(role);
            });
        });
    }

    function doLogin() {
        const l = loginInput.value.trim();
        const p = passwordInput.value.trim();
        if (!l || !p) {
            loginError.textContent = 'Заполните все поля';
            return;
        }
        const acc = ACCOUNTS.find(a => a.login === l && a.password === p);
        if (acc) {
            sessionStorage.setItem('profitprint_user', acc.login);
            sessionStorage.setItem('profitprint_role', acc.role);
            if (ROLE_OPERATORS[acc.role]) {
                showOperatorSelection(acc.role);
            } else {
                window.location.href = redirectForRole(acc.role);
            }
        } else {
            loginError.textContent = 'Неверный логин или пароль';
        }
    }

    btnLogin.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    loginInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });

    (function autoEntry() {
        const user = sessionStorage.getItem('profitprint_user');
        const role = sessionStorage.getItem('profitprint_role');
        if (user && role) {
            if (ROLE_OPERATORS[role]) {
                const op = sessionStorage.getItem('profitprint_operator');
                if (op) {
                    window.location.href = redirectForRole(role);
                } else {
                    showOperatorSelection(role);
                }
            } else {
                window.location.href = redirectForRole(role);
            }
        }
    })();
</script>
</body>
</html>
