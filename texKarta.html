<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Техкарта — ProfitPrint</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/texKarta.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* ============================================================
       ПРИНУДИТЕЛЬНАЯ СВЕТЛАЯ ТЕМА
       ============================================================ */
    :root {
      --bg-main: #f1f4f9;
      --bg-white: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --primary-blue: #2563eb;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --accent-red: #dc2626;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body.dark-theme,
    body[data-theme="dark"] {
      --bg-main: #f1f4f9 !important;
      --bg-white: #ffffff !important;
      --text-primary: #1e293b !important;
      --text-secondary: #64748b !important;
      --border-color: #e2e8f0 !important;
      --primary-blue: #2563eb !important;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08) !important;
      --accent-red: #dc2626 !important;
    }

    .theme-switch-wrapper {
      display: none !important;
    }

    /* ============================================================
       Стили для печати
       ============================================================ */
    @media print {
      body * {
        visibility: hidden;
      }
      #techCardContent, #techCardContent * {
        visibility: visible;
      }
      #techCardContent {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 20px;
        margin: 0;
        background: #fff;
        border: none;
        box-shadow: none;
        border-radius: 0;
      }
      #techCardContent h2 {
        border-bottom: 2px solid #2563eb;
      }
      .action-bar, .back-link, .screenshot-modal, .modal-overlay {
        display: none !important;
      }
      .tech-card .screenshot-container img {
        max-width: 150px;
        max-height: 150px;
      }
      .tech-card .file-block .label {
        font-weight: 600;
      }
      .tech-card .file-row {
        break-inside: avoid;
      }
    }

    /* ============================================================
       Стили для списка техкарт (с фильтром)
       ============================================================ */
    .tech-list {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      max-width: 1200px;
      margin: 0 auto;
    }
    .tech-list h2 {
      margin: 0 0 16px 0;
      color: var(--text-primary);
      font-size: 20px;
      border-bottom: 2px solid var(--primary-blue);
      padding-bottom: 8px;
    }
    .tech-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .tech-list th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg-main);
      border-bottom: 2px solid var(--border-color);
      font-weight: 600;
      color: var(--text-secondary);
    }
    .tech-list td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    .tech-list tr:hover {
      background: var(--bg-main);
      cursor: pointer;
    }
    .tech-list .btn-link {
      padding: 4px 12px;
      border-radius: 6px;
      background: var(--primary-blue);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      border: none;
      cursor: pointer;
    }
    .tech-list .btn-link:hover {
      opacity: 0.85;
    }
    .tech-list .empty-msg {
      padding: 30px;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Фильтр */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--bg-main);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      align-items: center;
    }
    .filter-bar .search-wrap {
      flex: 1 1 200px;
      min-width: 140px;
    }
    .filter-bar .search-wrap input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      background: var(--bg-white);
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .filter-bar .search-wrap input:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .filter-bar .services-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
    }
    .filter-bar .services-checkboxes label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .filter-bar .services-checkboxes input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--primary-blue);
      cursor: pointer;
      flex-shrink: 0;
    }
    .filter-bar .filter-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .filter-bar .filter-actions .btn-sm {
      padding: 5px 14px;
      font-size: 13px;
      height: 34px;
    }

    /* ============================================================
       Стили для отображения одной техкарты (табличный вид)
       ============================================================ */
    .tech-card-container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .tech-card-container .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .tech-card-container .back-link:hover {
      text-decoration: underline;
    }

    .tech-card {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      font-size: 14px;
    }
    .tech-card h2 {
      margin: 0 0 18px 0;
      color: var(--text-primary);
      font-size: 22px;
      border-bottom: 2px solid var(--primary-blue);
      padding-bottom: 8px;
    }
    .tech-card .order-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 40px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }
    .tech-card .order-meta p {
      margin: 0;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .tech-card .order-meta p span {
      font-weight: 400;
      color: var(--text-primary);
      margin-left: 4px;
    }
    .tech-card .order-meta .qty {
      font-weight: 700;
      color: var(--primary-blue);
    }

    .tech-card .section-title {
      font-weight: 700;
      font-size: 16px;
      margin: 24px 0 10px 0;
      color: var(--primary-blue);
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 4px;
    }
    .tech-card table {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0 10px 0;
      font-size: 13px;
    }
    .tech-card table th {
      background: var(--bg-main);
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      text-align: center;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .tech-card table td {
      padding: 7px 10px;
      border: 1px solid var(--border-color);
      text-align: center;
      color: var(--text-primary);
    }
    .tech-card table td:empty::before {
      content: "";
    }

    /* Таблица Тех ОП — три строки: Параметр, План и Факт */
    .tech-card .tech-op-table td:first-child {
      font-weight: 600;
      background: var(--bg-main);
    }
    .tech-card .tech-op-table tr.row-parametr td {
      background: rgba(37, 99, 235, 0.04);
    }
    .tech-card .tech-op-table tr.row-plan td,
    .tech-card .tech-op-table tr.row-fakt td {
      min-height: 30px;
    }

    .tech-card .file-block {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
    .tech-card .file-block .file-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 16px;
    }
    .tech-card .file-block .label {
      font-weight: 600;
      color: var(--text-secondary);
      margin-right: 4px;
    }
    .tech-card .screenshot-container {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tech-card .screenshot-container img {
      max-width: 200px;
      max-height: 200px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .tech-card .screenshot-container img:hover {
      transform: scale(1.02);
    }
    .tech-card .pdf-name {
      background: var(--bg-main);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      display: inline-block;
      font-family: monospace;
      font-size: 13px;
    }

    .action-bar {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .hidden-input {
      display: none;
    }

    /* Модалка для увеличения скриншота */
    .screenshot-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .screenshot-modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    .screenshot-modal.visible {
      display: flex;
    }
    .screenshot-modal .close-modal {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }

    @media screen and (max-width: 768px) {
      .tech-card {
        padding: 16px;
      }
      .tech-card table {
        font-size: 12px;
      }
      .tech-card table th,
      .tech-card table td {
        padding: 5px 6px;
      }
      .filter-bar .services-checkboxes {
        gap: 4px 10px;
      }
      .filter-bar .services-checkboxes label {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo-small"><div class="logo-icon">PP</div><span>ProfitPrint</span></div>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html">📊 Главная</a></li>
        <li><a href="orders.html">📋 Заказы контрагентов</a></li>
        <li><a href="production.html">🏭 Заказы на производство</a></li>
        <li><a href="invoices.html">📦 Накладные</a></li>
        <li><a href="clients.html">👥 Контрагенты</a></li>
        <li><a href="products.html">📁 Продукты</a></li>
        <li><a href="reconciliations.html">📑 Акты сверки</a></li>
        <li><a href="backups.html">🗑️ Резервные копии</a></li>
        <li><a href="otpCex.html">⚙️ На производство</a></li>
        <li><a href="texKarta.html" class="active">⚙️ Техкарта</a></li>
      </ul>
      <div class="theme-switch-wrapper">
        <button id="themeToggle" class="btn btn-secondary" style="display:none;">
          <span id="themeIcon">🌙</span> <span id="themeLabel">Тёмная тема</span>
        </button>
      </div>
    </nav>

    <main class="main-content">
      <div class="top-bar">
        <h1>Технологическая карта</h1>
      </div>
      <div class="content-section">
        <div id="content">Загрузка...</div>
        <div id="actionBar" class="action-bar" style="display:none;">
          <button id="downloadPdfBtn" class="btn btn-primary">📥 Скачать PDF техкарты</button>
          <button id="viewOfficePdfBtn" class="btn btn-secondary" style="display:none;">👁️ Посмотреть PDF</button>
          <button id="uploadLocalPdfBtn" class="btn btn-secondary">📤 Загрузить PDF</button>
          <button id="toggleFilesBtn" class="btn btn-secondary">🖨️ Скрыть файлы</button>
          <button id="printBtn" class="btn btn-primary">🖨️ Печать</button>
        </div>
        <input type="file" id="localPdfInput" accept=".pdf" class="hidden-input">
      </div>
    </main>
  </div>

  <!-- Модалка для просмотра скриншота -->
  <div id="screenshotModal" class="screenshot-modal" onclick="this.classList.remove('visible')">
    <span class="close-modal">&times;</span>
    <img id="modalImage" src="" alt="Скриншот">
  </div>

  <script>
    (function() {
      document.body.classList.remove('dark-theme', 'dark');
      document.body.removeAttribute('data-theme');
      document.documentElement.classList.remove('dark-theme', 'dark');
      document.documentElement.removeAttribute('data-theme');
    })();

    document.addEventListener('DOMContentLoaded', function() {
      const content = document.getElementById('content');
      const actionBar = document.getElementById('actionBar');
      const downloadPdfBtn = document.getElementById('downloadPdfBtn');
      const viewOfficePdfBtn = document.getElementById('viewOfficePdfBtn');
      const uploadLocalPdfBtn = document.getElementById('uploadLocalPdfBtn');
      const localPdfInput = document.getElementById('localPdfInput');
      const toggleFilesBtn = document.getElementById('toggleFilesBtn');
      const printBtn = document.getElementById('printBtn');

      // Получаем ID из URL
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');

      // ---- Список возможных услуг (из otpCex) ----
      const SERVICE_LABELS = {
        vd_lak: 'ВД лак',
        lamination: 'Ламинация',
        embossing: 'Тиснение',
        cutting: 'Резка',
        gluing: 'Склейка',
        uv_lak: 'УФ лак',
        die_cut: 'Высечка',
        kongrev: 'Конгрев',
        flot_cutting: 'Флоторезка / Резка'
      };
      const SERVICE_KEYS = Object.keys(SERVICE_LABELS);

      // Функция загрузки всех заказов из localStorage
      function loadOrders() {
        let orders = [];
        try {
          const raw = localStorage.getItem('pp_orders') || localStorage.getItem('print_orders');
          if (raw) orders = JSON.parse(raw);
        } catch (e) {
          console.error('Ошибка загрузки заказов:', e);
        }
        return orders;
      }

      // ---- Функция рендеринга одной техкарты (табличный вид) ----
      function renderTechCard(order) {
        // Определяем услуги для таблицы Тех ОП
        const serviceMap = {
          lamination: '',
          vd_lak: '',
          embossing: '',
          kongrev: '',
          die_cut: '',
          gluing: '',
          uv_lak: '',
          cutting_pre: '',
          cutting_post: ''
        };

        if (order.services && Array.isArray(order.services)) {
          order.services.forEach(s => {
            if (s.name === 'lamination') serviceMap.lamination = s.type || 'есть';
            else if (s.name === 'vd_lak') serviceMap.vd_lak = s.type || 'есть';
            else if (s.name === 'embossing') serviceMap.embossing = s.type || 'есть';
            else if (s.name === 'kongrev') serviceMap.kongrev = 'есть';
            else if (s.name === 'die_cut') serviceMap.die_cut = 'есть';
            else if (s.name === 'gluing') serviceMap.gluing = s.type || 'есть';
            else if (s.name === 'uv_lak') serviceMap.uv_lak = s.type || 'есть';
            else if (s.name === 'cutting') {
              if (s.type === 'pre' || s.type === 'до печать') {
                serviceMap.cutting_pre = s.length ? `${s.length}×${s.width}` : 'есть';
              } else if (s.type === 'post' || s.type === 'пост печать') {
                serviceMap.cutting_post = s.length ? `${s.length}×${s.width}` : 'есть';
              } else if (s.type === 'both' || s.type === 'оба') {
                if (s.details) {
                  const pre = s.details.find(d => d.type === 'до печать');
                  const post = s.details.find(d => d.type === 'пост печать');
                  if (pre) serviceMap.cutting_pre = `${pre.length}×${pre.width}`;
                  if (post) serviceMap.cutting_post = `${post.length}×${post.width}`;
                }
              }
            }
          });
        }

        // Проверяем наличие флоторезки
        const hasFlot = order.services && order.services.some(s => s.name === 'flot_cutting');

        // Определяем формат печати
        const printType = order.print_type || 'A1';
        const printLabel = `Печать ${printType}`;

        // Значение по умолчанию для незаполненных ячеек услуг ("нет")
        const emptyOrDash = (val) => val ? val : 'нет';

        // Собираем HTML
        let html = `
          <div class="tech-card-container">
            <a href="texKarta.html" class="back-link">← Назад к списку</a>
            <div class="tech-card" id="techCardContent">
              <h2>Техкарта №${order.techcard_no || order.id}</h2>

              <div class="order-meta">
                <p><strong>Заказчик:</strong> <span>${order.customer || ''}</span></p>
                <p><strong>Название продукции:</strong> <span>${order.product_name || ''}</span></p>
                <p><strong>кол-во продукт:</strong> <span class="qty">${order.order_qty || 0}</span></p>
                <p><strong>Описание:</strong> <span>${order.description || ''}</span></p>
              </div>

              ${hasFlot ? `
                <div class="section-title">Флотарёзка</div>
                <table>
                  <thead>
                    <tr>
                      <th>материал</th>
                      <th>формат рулона</th>
                      <th>Размер листа</th>
                      <th>гр/м2</th>
                      <th>тираж листов</th>
                      <th>факт листов</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>${order.paper_type || ''}</td>
                      <td>${order.roll_format || ''}</td>
                      <td>${order.size_length || ''}×${order.size_width || ''}</td>
                      <td>${order.gsm || ''}</td>
                      <td>${order.print_sheets || 0}</td>
                      <td></td>
                    </tr>
                  </tbody>
                </table>
              ` : ''}

              <div class="section-title">Листовой</div>
              <table>
                <thead>
                  <tr>
                    <th>материал</th>
                    <th>Размер листа</th>
                    <th>гр/м2</th>
                    <th>тираж листов</th>
                    <th>факт листов</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>${order.paper_type || ''}</td>
                    <td>${order.size_length || ''}×${order.size_width || ''}</td>
                    <td>${order.gsm || ''}</td>
                    <td>${order.print_sheets || 0}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>

              <div class="section-title">${printLabel}</div>
              <table>
                <thead>
                  <tr>
                    <th>Размер листа</th>
                    <th>цвет</th>
                    <th>приладка</th>
                    <th>тираж</th>
                    <th>ВД лак</th>
                    <th>брак</th>
                    <th>факт печати</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>${order.size_length || ''}×${order.size_width || ''}</td>
                    <td>${order.color || ''}</td>
                    <td>${order.make_ready || 0}</td>
                    <td>${order.print_sheets || 0}</td>
                    <td>${serviceMap.vd_lak || ''}</td>
                    <td></td>
                    <td></td>
                  </tr>
                </tbody>
              </table>

              <div class="section-title">Тех ОП</div>
              <table class="tech-op-table">
                <thead>
                  <tr>
                    <th>Параметр</th>
                    <th>ламинация</th>
                    <th>ВД Лак</th>
                    <th>тиснения</th>
                    <th>конгрев</th>
                    <th>высечка</th>
                    <th>склейка</th>
                    <th>Резка до печати</th>
                    <th>Резка пост печати</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="row-parametr">
                    <td><strong>Параметр</strong></td>
                    <td>${emptyOrDash(serviceMap.lamination)}</td>
                    <td>${emptyOrDash(serviceMap.vd_lak)}</td>
                    <td>${emptyOrDash(serviceMap.embossing)}</td>
                    <td>${emptyOrDash(serviceMap.kongrev)}</td>
                    <td>${emptyOrDash(serviceMap.die_cut)}</td>
                    <td>${emptyOrDash(serviceMap.gluing)}</td>
                    <td>${emptyOrDash(serviceMap.cutting_pre)}</td>
                    <td>${emptyOrDash(serviceMap.cutting_post)}</td>
                  </tr>
                  <tr class="row-plan">
                    <td><strong>План</strong></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                  </tr>
                  <tr class="row-fakt">
                    <td><strong>Факт</strong></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                  </tr>
                </tbody>
              </table>

              <!-- Блок файлов (только если есть данные) -->
              ${(order.pdf_filename || order.screenshot_base64) ? `
                <div class="section-title files-title">Файлы</div>
                <div class="file-block">
                  ${order.pdf_filename ? `
                    <div class="file-row">
                      <span class="label">Имя PDF:</span>
                      <span class="pdf-name">${order.pdf_filename}</span>
                    </div>
                  ` : ''}
                  ${order.screenshot_base64 ? `
                    <div class="file-row">
                      <span class="label">Скриншот:</span>
                      <div class="screenshot-container">
                        <img src="${order.screenshot_base64}" alt="Скриншот" onclick="document.getElementById('screenshotModal').classList.add('visible'); document.getElementById('modalImage').src='${order.screenshot_base64}';">
                      </div>
                    </div>
                  ` : ''}
                </div>
              ` : ''}
            </div>
          </div>
        `;

        content.innerHTML = html;
        actionBar.style.display = 'flex';

        // Переключатель видимости файлов
        let filesVisible = true;
        const filesTitle = document.querySelector('.files-title');
        const fileBlock = document.querySelector('.file-block');

        toggleFilesBtn.textContent = '🖨️ Скрыть файлы';
        toggleFilesBtn.onclick = function() {
          filesVisible = !filesVisible;
          if (filesTitle) filesTitle.style.display = filesVisible ? '' : 'none';
          if (fileBlock) fileBlock.style.display = filesVisible ? '' : 'none';
          this.textContent = filesVisible ? '🖨️ Скрыть файлы' : '🖨️ Показать файлы';
        };

        // Кнопка печати
        printBtn.onclick = function() {
          window.print();
        };

        // Скачать PDF техкарты
        downloadPdfBtn.onclick = function() {
          const element = document.getElementById('techCardContent');
          if (!element) return;
          html2canvas(element, {
            scale: 2,
            backgroundColor: '#ffffff',
            allowTaint: true,
            useCORS: true
          }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            let heightLeft = pdfHeight;
            let position = 0;

            pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
            heightLeft -= pdf.internal.pageSize.getHeight();

            while (heightLeft > 0) {
              position = heightLeft - pdfHeight;
              pdf.addPage();
              pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
              heightLeft -= pdf.internal.pageSize.getHeight();
            }
            pdf.save(`Техкарта_${order.techcard_no || order.id}.pdf`);
          }).catch(err => {
            alert('Ошибка при создании PDF: ' + err.message);
          });
        };

        viewOfficePdfBtn.onclick = function() {
          if (order.pdf_filename) {
            alert(`PDF-файл "${order.pdf_filename}" находится на сервере. Для просмотра откройте его вручную.`);
          } else {
            alert('PDF-файл не указан.');
          }
        };

        uploadLocalPdfBtn.onclick = function() {
          localPdfInput.click();
        };
        localPdfInput.onchange = function(e) {
          const file = e.target.files[0];
          if (file) {
            alert(`Выбран файл: ${file.name}`);
          }
          this.value = '';
        };

        // Модалка скриншота
        const modal = document.getElementById('screenshotModal');
        modal.onclick = function(e) {
          if (e.target === this) this.classList.remove('visible');
        };
      }

      // ---- Если есть ID – показываем одну техкарту ----
      if (orderId) {
        const orders = loadOrders();
        const order = orders.find(o => String(o.id) === String(orderId));

        if (!order) {
          content.innerHTML = `<div class="tech-card"><h2>Ошибка</h2><p>Заказ с ID ${orderId} не найден. <a href="texKarta.html">Вернуться к списку</a></p></div>`;
          actionBar.style.display = 'none';
          return;
        }

        renderTechCard(order);
        return;
      }

      // ---- Если ID нет – показываем список с фильтром ----
      const allOrders = loadOrders();

      // Получаем уникальные услуги из всех заказов (для чекбоксов)
      const serviceSet = new Set();
      allOrders.forEach(o => {
        if (o.services && Array.isArray(o.services)) {
          o.services.forEach(s => {
            if (s.name) serviceSet.add(s.name);
          });
        }
      });
      SERVICE_KEYS.forEach(key => serviceSet.add(key));
      const serviceList = Array.from(serviceSet).sort();

      // Сохраняем оригинальный список для фильтрации
      window._originalOrders = allOrders.slice();

      // Функция отображения списка с фильтрацией
      function renderList(orders) {
        if (orders.length === 0) {
          content.innerHTML = `
            <div class="tech-list">
              <h2>📋 Список техкарт</h2>
              <div class="empty-msg">Нет заказов, соответствующих фильтру.</div>
            </div>
          `;
          actionBar.style.display = 'none';
          return;
        }

        orders.sort((a, b) => b.id - a.id);

        let tableRows = orders.map(o => `
          <tr onclick="window.location.href='texKarta.html?id=${o.id}'">
            <td><strong>${o.techcard_no || o.id}</strong></td>
            <td>${o.customer || ''}</td>
            <td>${o.product_name || ''}</td>
            <td>${o.manager || ''}</td>
            <td>${o.order_qty || 0}</td>
            <td>${o.print_sheets || 0}</td>
            <td>
              <a href="texKarta.html?id=${o.id}" class="btn-link">Открыть</a>
            </td>
          </tr>
        `).join('');

        const listHTML = `
          <div class="tech-list">
            <h2>📋 Список техкарт (${orders.length})</h2>
            <div class="filter-bar" id="filterBar">
              <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по номеру, заказчику, продукции..." oninput="applyFilters()">
              </div>
              <div class="services-checkboxes" id="servicesFilter">
                ${serviceList.map(key => `
                  <label>
                    <input type="checkbox" value="${key}" onchange="applyFilters()"> ${SERVICE_LABELS[key] || key}
                  </label>
                `).join('')}
              </div>
              <div class="filter-actions">
                <button class="btn btn-sm btn-secondary" onclick="resetFilters()">Сбросить</button>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>№ техкарты</th>
                  <th>Заказчик</th>
                  <th>Продукция</th>
                  <th>Менеджер</th>
                  <th>Кол-во</th>
                  <th>Тираж</th>
                  <th>Действие</th>
                </tr>
              </thead>
              <tbody>
                ${tableRows}
              </tbody>
            </table>
          </div>
        `;

        content.innerHTML = listHTML;
        actionBar.style.display = 'none';
      }

      // Функция фильтрации
      window.applyFilters = function() {
        const searchVal = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
        const checkedBoxes = document.querySelectorAll('#servicesFilter input[type="checkbox"]:checked');
        const selectedServices = Array.from(checkedBoxes).map(cb => cb.value);

        let filtered = window._originalOrders || [];

        if (searchVal) {
          filtered = filtered.filter(o => {
            const searchFields = [
              o.techcard_no, o.customer, o.product_name, o.manager
            ].map(f => String(f || '').toLowerCase());
            return searchFields.some(f => f.includes(searchVal));
          });
        }

        if (selectedServices.length > 0) {
          filtered = filtered.filter(o => {
            if (!o.services || !Array.isArray(o.services) || o.services.length === 0) return false;
            const serviceNames = o.services.map(s => s.name);
            return selectedServices.some(sel => serviceNames.includes(sel));
          });
        }

        renderList(filtered);
      };

      window.resetFilters = function() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = '';
        const checkboxes = document.querySelectorAll('#servicesFilter input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = false);
        applyFilters();
      };

      if (allOrders.length === 0) {
        content.innerHTML = `
          <div class="tech-list">
            <h2>📋 Список техкарт</h2>
            <div class="empty-msg">Техкарт пока нет. Создайте заказ на странице <a href="otpCex.html">«Отправка в цех»</a>.</div>
          </div>
        `;
        actionBar.style.display = 'none';
        return;
      }

      renderList(allOrders);
    });
  </script>
  <script src="js/auth-check.js"></script>
  <script src="js/nav-filter.js"></script>
</body>
</html>
