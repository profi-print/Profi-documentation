<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Техкарта — ProfitPrint</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/texKarta.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ProfitPrint">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg-main: #f1f4f9;
      --bg-white: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --primary-blue: #2563eb;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --accent-red: #dc2626;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body.dark-theme, body[data-theme="dark"] {
      --bg-main: #1e293b !important;
      --bg-white: #0f172a !important;
      --text-primary: #e2e8f0 !important;
      --text-secondary: #94a3b8 !important;
      --border-color: #334155 !important;
      --primary-blue: #3b82f6 !important;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4) !important;
      --accent-red: #ef4444 !important;
    }
    .theme-switch-wrapper { display: none !important; }

    * { 
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      font-family: var(--font-main);
      color: var(--text-primary);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .app-container { display: flex; min-height: 100vh; }

    /* Бургер-меню */
    .burger-btn {
      display: none;
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: calc(12px + env(safe-area-inset-left));
      z-index: 1100;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      width: 48px;
      height: 48px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      color: var(--text-primary);
      align-items: center;
      justify-content: center;
      -webkit-appearance: none;
      appearance: none;
    }
    .burger-btn:active {
      transform: scale(0.95);
      background: var(--bg-main);
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1040;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.show { display: block; opacity: 1; }

    @media screen and (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100vh;
        transition: left 0.3s ease;
        z-index: 1050;
        background: #1e3a8a;
        box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-top: var(--safe-top);
      }
      .sidebar.open { left: 0; }
      .burger-btn { display: flex; }
      .main-content {
        margin-left: 0 !important;
        padding: 70px 12px 20px;
        padding-top: calc(70px + var(--safe-top));
        width: 100%;
        overflow-x: hidden;
      }
      .sidebar .nav-menu li a {
        color: #ffffff !important;
        background: transparent !important;
        font-weight: 500;
        padding: 14px 16px;
      }
      .sidebar .nav-menu li a:hover {
        background: rgba(255, 255, 255, 0.1) !important;
      }
      .sidebar .nav-menu li a.active {
        background: #2563eb !important;
        color: #fff !important;
      }
    }

    @media print {
      body * { visibility: hidden; }
      #techCardContent, #techCardContent * { visibility: visible; }
      #techCardContent {
        position: absolute; left: 0; top: 0; width: 100%; padding: 20px; margin: 0;
        background: #fff; border: none; box-shadow: none; border-radius: 0;
      }
      #techCardContent h2 { border-bottom: 2px solid #2563eb; }
      .action-bar, .back-link, .screenshot-modal { display: none !important; }
      .tech-card .screenshot-container img { max-width: 350px; max-height: 350px; }
      .tech-card .file-row { break-inside: avoid; }
    }

    .tech-list {
      background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 20px; box-shadow: 0 1px 3px rgba(15,23,42,0.06); max-width: 1200px; margin: 0 auto;
    }
    .tech-list h2 { margin: 0 0 16px 0; color: var(--text-primary); font-size: 20px; border-bottom: 2px solid var(--primary-blue); padding-bottom: 8px; }
    .tech-list .filter-bar { display: flex; flex-wrap: wrap; gap: 12px 20px; margin-bottom: 20px; padding: 12px 16px; background: var(--bg-main); border-radius: 8px; border: 1px solid var(--border-color); align-items: center; }
    .tech-list .filter-bar .search-wrap { flex: 1 1 200px; min-width: 140px; }
    .tech-list .filter-bar .search-wrap input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-white); color: var(--text-primary); transition: border-color 0.2s; -webkit-appearance: none; appearance: none; }
    .tech-list .filter-bar .search-wrap input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    .tech-list .filter-bar .filter-actions { display: none; }
    
    /* Таблица для десктопа */
    .tech-list .table-responsive { overflow-x: auto; }
    .tech-list table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
    .tech-list th { text-align: left; padding: 10px 12px; background: var(--bg-main); border-bottom: 2px solid var(--border-color); font-weight: 600; color: var(--text-secondary); }
    .tech-list td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); }
    .tech-list tr:hover { background: var(--bg-main); cursor: pointer; }
    .tech-list .btn-link { padding: 6px 14px; border-radius: 6px; background: var(--primary-blue); color: #fff; text-decoration: none; font-size: 13px; border: none; cursor: pointer; display: inline-block; min-height: 32px; line-height: 20px; }
    .tech-list .btn-link:hover { opacity: 0.85; }
    .tech-list .empty-msg { padding: 30px; text-align: center; color: var(--text-secondary); font-style: italic; }

    /* Карточки для мобильных */
    .tech-cards { display: none; }
    .tech-card-item {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tech-card-item:active {
      transform: scale(0.98);
      background: var(--bg-main);
    }
    .tech-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }
    .tech-card-no {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      font-size: 16px;
      color: var(--primary-blue);
    }
    .tech-card-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .tech-card-label {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .tech-card-value {
      font-weight: 600;
      color: var(--text-primary);
      text-align: right;
    }
    .tech-card-actions {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
    }
    .tech-card-actions .btn-link {
      flex: 1;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--primary-blue);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tech-card-container { max-width: 1100px; margin: 0 auto; }
    .tech-card-container .back-link { 
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px; 
      color: var(--primary-blue); 
      text-decoration: none; 
      font-weight: 600;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      transition: all 0.2s;
      min-height: 40px;
    }
    .tech-card-container .back-link:hover { 
      background: var(--bg-main);
      border-color: var(--primary-blue);
    }
    .tech-card-container .back-link:active {
      transform: scale(0.97);
    }

    .tech-card {
      background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 24px 28px; box-shadow: 0 1px 3px rgba(15,23,42,0.06); font-size: 14px;
      overflow-x: hidden;
    }
    .tech-card h2 { margin: 0 0 18px 0; color: var(--text-primary); font-size: 22px; border-bottom: 2px solid var(--primary-blue); padding-bottom: 8px; }

    .tech-card .order-meta { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px solid var(--border-color); }
    .tech-card .order-meta .meta-row { display: flex; flex-wrap: wrap; gap: 12px 40px; align-items: baseline; margin-bottom: 8px; }
    .tech-card .order-meta .meta-row p { margin: 0; display: flex; align-items: baseline; gap: 8px; }
    .tech-card .order-meta .label { font-weight: 400; color: var(--text-primary); white-space: nowrap; }
    .tech-card .order-meta .label::after { content: " —"; font-weight: 400; color: var(--text-secondary); margin-left: 2px; }
    .tech-card .order-meta .value { font-weight: 700; color: var(--text-primary); }
    .tech-card .order-meta .value.qty { font-weight: 700; color: var(--primary-blue); }
    .tech-card .order-meta .desc-row { display: flex; align-items: baseline; gap: 8px; background: var(--bg-main); padding: 8px 16px; border-radius: 6px; margin: 0; width: 100%; }
    .tech-card .order-meta .desc-row .desc-label { font-weight: 400; color: var(--text-primary); flex-shrink: 0; }
    .tech-card .order-meta .desc-row .desc-label::after { content: " —"; font-weight: 400; color: var(--text-secondary); margin-left: 2px; }
    .tech-card .order-meta .desc-row .desc-value { flex: 1; text-align: center; color: var(--text-primary); font-weight: 700; }

    .tech-card .section-title { font-weight: 700; font-size: 16px; margin: 24px 0 10px 0; color: var(--primary-blue); border-bottom: 1px dashed var(--border-color); padding-bottom: 4px; }
    .tech-card .table-responsive { overflow-x: auto; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .tech-card table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tech-card table th { background: var(--bg-main); padding: 10px 12px; border: 1px solid var(--border-color); text-align: center; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .tech-card table td { padding: 10px 12px; border: 1px solid var(--border-color); text-align: center; color: var(--text-primary); white-space: nowrap; }
    .tech-card table td strong { font-weight: 700; color: var(--text-primary); }

    .tech-card .tech-op-table { width: auto; max-width: 100%; table-layout: auto; }
    .tech-card .tech-op-table th,
    .tech-card .tech-op-table td { padding: 10px 16px; white-space: nowrap; text-align: center; }
    .tech-card .tech-op-table .row-label { font-weight: 600; background: var(--bg-main); white-space: nowrap; text-align: left; padding-left: 14px; }
    .tech-card .tech-op-table .row-label.tech-op-header { background: #d0d8e0; font-weight: 700; }

    .tech-card .file-block { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
    .tech-card .file-block .file-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 16px; }
    .tech-card .file-block .label { font-weight: 600; color: var(--text-secondary); margin-right: 4px; }
    .tech-card .screenshot-container { display: inline-flex; align-items: center; gap: 8px; }
    .tech-card .screenshot-container img { max-width: 100%; max-height: 300px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; transition: transform 0.2s; }
    .tech-card .screenshot-container img:hover { transform: scale(1.02); }
    .tech-card .screenshot-container img:active { transform: scale(0.98); }
    .tech-card .pdf-name { background: var(--bg-main); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color); display: inline-block; font-family: monospace; font-size: 13px; word-break: break-all; }

    .action-bar { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .action-bar button {
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      background: var(--primary-blue);
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
      min-height: 48px;
      -webkit-appearance: none;
      appearance: none;
    }
    .action-bar button.secondary {
      background: var(--bg-main);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .action-bar button:active { transform: scale(0.97); }

    .hidden-input { display: none; }

    .screenshot-modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center;
      padding: 20px;
    }
    .screenshot-modal img { max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    .screenshot-modal.visible { display: flex; }
    .screenshot-modal .close-modal { 
      position: absolute; 
      top: calc(20px + var(--safe-top)); 
      right: 20px; 
      font-size: 40px; 
      color: #fff; 
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      transition: background 0.2s;
    }
    .screenshot-modal .close-modal:active {
      background: rgba(0,0,0,0.8);
    }

    .info-title {
      display: flex; justify-content: space-between; align-items: baseline; width: 100%;
    }
    .material-type-badge {
      font-size: 1.1em; font-weight: 800; background: rgba(37, 99, 235, 0.1);
      color: var(--primary-blue); padding: 2px 10px; border-radius: 6px;
      margin-left: auto; white-space: nowrap;
    }

    .sidebar {
      background: #1e3a8a !important;
    }
    .sidebar .nav-menu li a {
      color: #ffffff !important;
      background: transparent !important;
    }
    .sidebar .nav-menu li a:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #ffffff !important;
    }
    .sidebar .nav-menu li a.active {
      background: #2563eb !important;
      color: #ffffff !important;
    }
    .sidebar .sidebar-header .logo-small span {
      color: #ffffff !important;
    }
    .sidebar .sidebar-header .logo-icon {
      background: #2563eb !important;
      color: #ffffff !important;
    }

    /* ============================================
       МОБИЛЬНАЯ АДАПТАЦИЯ
       ============================================ */
    @media (max-width: 768px) {
      .tech-list { padding: 16px; }
      .tech-list h2 { font-size: 18px; }
      .tech-list .filter-bar { padding: 10px 12px; }
      .tech-list .filter-bar .search-wrap { width: 100%; }
      
      /* Скрываем таблицу, показываем карточки */
      .tech-list .table-responsive { display: none; }
      .tech-cards { display: block; }
      
      .tech-card { padding: 16px; }
      .tech-card h2 { font-size: 18px; margin-bottom: 14px; }
      .tech-card .section-title { font-size: 15px; margin: 18px 0 8px 0; }
      
      .tech-card .order-meta .meta-row { 
        flex-direction: column; 
        gap: 6px;
      }
      .tech-card .order-meta .meta-row p {
        flex-direction: row;
        justify-content: space-between;
        width: 100%;
      }
      .tech-card .order-meta .desc-row {
        flex-direction: column;
        gap: 4px;
        text-align: left;
      }
      .tech-card .order-meta .desc-row .desc-value {
        text-align: left;
      }
      
      .tech-card table { font-size: 12px; }
      .tech-card table th,
      .tech-card table td { padding: 8px 10px; }
      
      .tech-card .tech-op-table th,
      .tech-card .tech-op-table td { padding: 8px 12px; font-size: 12px; }
      
      .tech-card .screenshot-container img { max-height: 250px; }
      .tech-card .pdf-name { font-size: 12px; padding: 4px 10px; }
      
      .action-bar { flex-direction: column; gap: 10px; }
      .action-bar button { width: 100%; padding: 14px 20px; font-size: 14px; }
      
      .material-type-badge { font-size: 0.95em; padding: 2px 8px; }
      
      .info-title { flex-direction: column; gap: 8px; align-items: flex-start; }
      .material-type-badge { margin-left: 0; }
    }

    @media (max-width: 480px) {
      .tech-list { padding: 12px; }
      .tech-card-item { padding: 14px; }
      .tech-card { padding: 14px; }
      .tech-card h2 { font-size: 17px; }
      .tech-card .section-title { font-size: 14px; }
      .tech-card table { font-size: 11px; }
      .tech-card table th,
      .tech-card table td { padding: 6px 8px; }
      .tech-card .tech-op-table th,
      .tech-card .tech-op-table td { padding: 6px 10px; font-size: 11px; }
      .action-bar button { font-size: 13px; padding: 12px 16px; }
    }

    /* Landscape mode */
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .tech-card { padding: 16px; }
      .tech-card .screenshot-container img { max-height: 200px; }
      .action-bar { flex-direction: row; }
      .action-bar button { width: auto; }
    }
    /* Все поля формы на 100% ширины */
.form-group,
.form-row,
.form-row .form-group {
  width: 100%;
  max-width: 100%;
}

input[type="text"],
input[type="number"],
input[type="email"],
select,
textarea {
  width: 100% !important;
  max-width: 100% !important;
  -webkit-appearance: none;
  appearance: none;
}

/* Убираем горизонтальный скролл везде */
body {
  overflow-x: hidden;
  max-width: 100vw;
}

.app-container {
  max-width: 100vw;
  overflow-x: hidden;
}

.main-content {
  max-width: 100%;
  overflow-x: hidden;
}

.form-container {
  max-width: 100%;
  overflow-x: hidden;
}

/* Таблица данных - адаптивная */
.data-table {
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
  display: block;
}

.data-table tr {
  display: flex;
  flex-direction: column;
  margin-bottom: 12px;
}

@media (max-width: 768px) {
  .data-table td {
    display: block;
    width: 100%;
    padding: 8px 0;
  }
  
  .data-table td:first-child {
    font-size: 12px;
    margin-bottom: 4px;
  }
  
  /* Все поля на всю ширину */
  .form-row {
    grid-template-columns: 1fr !important;
    gap: 12px;
  }
  
  .material-fields-row {
    flex-direction: column;
  }
  
  .material-fields-row .field-group {
    width: 100%;
  }
  
  /* Кнопки действий на всю ширину */
  .form-actions {
    flex-direction: column;
    width: 100%;
  }
  
  .form-actions .btn {
    width: 100%;
  }
}

  -webkit-appearance: none;
  appearance: none;
}

  transform: scale(0.95);

}

/* Overlay для закрытия */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1040;
  opacity: 0;
  transition: opacity 0.3s;
}

  display: block; 
  opacity: 1;
}

  .sidebar {
    position: fixed;

    box-shadow: 2px 0 12px rgba(0,0,0,0.1);
    overflow-y: auto;

  }

  }
}
  </style>
</head>
<body>
  <button class="burger-btn" id="burgerBtn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="app-container">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="logo-small"><div class="logo-icon">PP</div><span>ProfitPrint</span></div></div>
      <ul class="nav-menu">
        <li><a href="index.html">📊 Главная</a></li>
        <li><a href="index2.html">📊 Главная</a></li>
        <li><a href="orders.html">📋 Заказы контрагентов</a></li>
        <li><a href="production.html">🏭 Заказы на производство</a></li>
        <li><a href="invoices.html">📦 Накладные</a></li>
        <li><a href="clients.html">👥 Контрагенты</a></li>
        <li><a href="products.html">📁 Продукты</a></li>
        <li><a href="reconciliations.html">📑 Акты сверки</a></li>
        <li><a href="backups.html">🗑️ Резервные копии</a></li>
        <li><a href="otpCex.html">⚙️ На производство</a></li>
        <li><a href="texKarta.html" class="active">⚙️ Техкарта</a></li>
        <li><a href="statuses.html">📊 Статусы</a></li>
      </ul>
      <div class="theme-switch-wrapper">
        <button id="themeToggle" class="btn btn-secondary" style="display:none;">
          <span id="themeIcon">🌙</span> <span id="themeLabel">Тёмная тема</span>
        </button>
      </div>
    </nav>

    <main class="main-content">
      <div class="top-bar"><h1>Технологическая карта</h1></div>
      <div class="content-section">
        <div id="content">Загрузка...</div>
        <div id="actionBar" class="action-bar" style="display:none;">
          <button id="downloadPdfBtn">📥 Скачать PDF</button>
          <button id="toggleFilesBtn" class="secondary">🖨️ Скрыть файлы</button>
          <button id="printBtn" class="secondary">🖨️ Печать</button>
        </div>
        <input type="file" id="localPdfInput" accept=".pdf" class="hidden-input">
      </div>
    </main>
  </div>

  <div id="screenshotModal" class="screenshot-modal" onclick="this.classList.remove('visible')">
    <span class="close-modal">&times;</span>
    <img id="modalImage" src="" alt="Скриншот">
  </div>

  <script>
    function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
  
  // Блокируем прокрутку body при открытом меню
  if (sidebar.classList.contains('open')) {
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = '';
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// Закрытие при клике на overlay
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

// Свайп для закрытия сайдбара
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  if (document.getElementById('sidebar').classList.contains('open')) {
    touchStartX = e.touches[0].clientX;
  }
});
document.addEventListener('touchend', e => {
  if (document.getElementById('sidebar').classList.contains('open')) {
    const touchEndX = e.changedTouches[0].clientX;
    if (touchStartX - touchEndX > 50) {
      closeSidebar();
    }
  }
});
    (function() {
      document.body.classList.remove('dark-theme', 'dark');
      document.body.removeAttribute('data-theme');
      document.documentElement.classList.remove('dark-theme', 'dark');
      document.documentElement.removeAttribute('data-theme');
    })();

    document.addEventListener('DOMContentLoaded', function() {
      const content = document.getElementById('content');
      const actionBar = document.getElementById('actionBar');
      const downloadPdfBtn = document.getElementById('downloadPdfBtn');
      const toggleFilesBtn = document.getElementById('toggleFilesBtn');
      const printBtn = document.getElementById('printBtn');
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');

      function loadOrders() {
        let orders = [];
        try {
          const raw = localStorage.getItem('pp_orders') || localStorage.getItem('print_orders');
          if (raw) orders = JSON.parse(raw);
        } catch (e) { console.error('Ошибка загрузки заказов:', e); }
        return orders;
      }

      function renderTechCard(order) {
        const displaySheets = Math.ceil(order.print_sheets || 0);
        const displaySheetsFormatted = displaySheets.toLocaleString('ru-RU');
        const orderQty = order.order_qty || 0;
        const orderQtyFormatted = orderQty.toLocaleString('ru-RU');
        const makeReadyFormatted = (order.make_ready || 0).toLocaleString('ru-RU');
        const gsmFormatted = (order.gsm || '').toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        const rollFormatFormatted = (order.roll_format || '').toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        const hasRollFormat = order.roll_format && String(order.roll_format).trim() !== '';

        const materialType = order.material_type || 'roll';
        const isDivideByTwo = order.divide_by_two === true;

        let materialLabel = 'Информация о материале';
        if (materialType === 'roll') {
          materialLabel = isDivideByTwo ? 'Флоторезка 1/2' : 'Флоторезка';
        } else {
          materialLabel = isDivideByTwo ? 'Листовой 1/2' : 'Листовой';
        }

        let sheetWidth, sheetLength;
        if (materialType === 'roll') {
          sheetWidth = order.roll_width || order.size_width || 0;
          sheetLength = order.flot_length || order.size_length || 0;
        } else {
          sheetWidth = order.sheet_width || order.size_width || 0;
          sheetLength = order.sheet_length || order.size_length || 0;
        }
        const sheetSizeFormatted = `${sheetWidth}×${sheetLength}`;
        const printWidth = order.size_width || 0;
        const printLength = order.size_length || 0;
        const printSizeFormatted = `${printWidth}×${printLength}`;

        const serviceMap = {
          lamination: '', vd_lak: '', embossing: '', kongrev: '',
          die_cut: '', gluing: '', uv_lak: '', cutting_pre: '', cutting_post: ''
        };

        if (order.services && Array.isArray(order.services)) {
          order.services.forEach(s => {
            if (s.name === 'lamination') serviceMap.lamination = s.type || 'есть';
            else if (s.name === 'vd_lak') serviceMap.vd_lak = s.type || 'есть';
            else if (s.name === 'embossing') serviceMap.embossing = s.type || 'есть';
            else if (s.name === 'kongrev') serviceMap.kongrev = 'есть';
            else if (s.name === 'die_cut') serviceMap.die_cut = 'есть';
            else if (s.name === 'gluing') serviceMap.gluing = s.type || 'есть';
            else if (s.name === 'uv_lak') serviceMap.uv_lak = s.type || 'есть';
            else if (s.name === 'cutting') {
              if (s.type === 'pre' || s.type === 'до печать') {
                serviceMap.cutting_pre = (s.width && s.length) ? `${s.width}×${s.length}` : 'есть';
              } else if (s.type === 'post' || s.type === 'пост печать') {
                serviceMap.cutting_post = (s.width && s.length) ? `${s.width}×${s.length}` : 'есть';
              } else if (s.type === 'both' || s.type === 'оба') {
                if (s.details) {
                  const pre = s.details.find(d => d.type === 'до печать');
                  const post = s.details.find(d => d.type === 'пост печать');
                  if (pre && pre.width && pre.length) serviceMap.cutting_pre = `${pre.width}×${pre.length}`;
                  if (post && post.width && post.length) serviceMap.cutting_post = `${post.width}×${post.length}`;
                }
              }
            }
          });
        }

        const printType = order.print_type || 'A1';
        const printLabel = `Печать ${printType}`;

        const serviceList = [
          { key: 'lamination', label: 'ламинация' },
          { key: 'vd_lak', label: 'ВД Лак' },
          { key: 'embossing', label: 'тиснения' },
          { key: 'kongrev', label: 'конгрев' },
          { key: 'die_cut', label: 'высечка' },
          { key: 'gluing', label: 'склейка' },
          { key: 'cutting_pre', label: 'Резка до печати' },
          { key: 'cutting_post', label: 'Резка пост печати' }
        ];
        const activeServices = serviceList.filter(item => serviceMap[item.key] !== '');

        let techOpHTML = '';
        if (activeServices.length > 0) {
          const techOpRow = activeServices.map(item => `<td>${item.label}</td>`).join('');
          const paramsRow = activeServices.map(item => {
            let val = serviceMap[item.key];
            if (item.key === 'die_cut' || item.key === 'gluing') val = 'есть';
            return `<td><strong>${val}</strong></td>`;
          }).join('');
          const planRow = activeServices.map(item => {
            let val = '';
            if (item.key === 'gluing') val = orderQtyFormatted;
            else val = displaySheetsFormatted;
            return `<td><strong>${val}</strong></td>`;
          }).join('');
          const faktRow = activeServices.map(() => `<td></td>`).join('');

          techOpHTML = `
            <div class="section-title">Пост печать</div>
            <div class="table-responsive">
              <table class="tech-op-table">
                <thead></thead>
                <tbody>
                  <tr><td class="row-label tech-op-header">Пост печать</td>${techOpRow}</tr>
                  <tr><td class="row-label">Параметры</td>${paramsRow}</tr>
                  <tr><td class="row-label">План</td>${planRow}</tr>
                  <tr><td class="row-label">Факт</td>${faktRow}</tr>
                </tbody>
              </table>
            </div>
          `;
        } else {
          techOpHTML = `
            <div class="section-title">Пост печать</div>
            <p style="color: var(--text-secondary); font-style: italic; margin: 10px 0;">Нет дополнительных услуг</p>
          `;
        }

        let html = `
          <div class="tech-card-container">
            <a href="texKarta.html" class="back-link">← Назад к списку</a>
            <div class="tech-card" id="techCardContent">
              <h2>Техкарта №${order.techcard_no || order.id}</h2>
              <div class="order-meta">
                <div class="meta-row">
                  <p><span class="label">Заказчик</span> <span class="value">${order.customer || ''}</span></p>
                  <p><span class="label">Название продукции</span> <span class="value">${order.product_name || ''}</span></p>
                  <p><span class="label">Кол-во продукции</span> <span class="value qty">${orderQtyFormatted}</span></p>
                </div>
                <div class="desc-row">
                  <span class="desc-label label">Примечание</span>
                  <span class="desc-value value">${order.description || ''}</span>
                </div>
              </div>
              <div class="section-title info-title">
                <span>Информация о материале</span>
                <span class="material-type-badge">${materialLabel}</span>
              </div>
              <div class="table-responsive">
                <table>
                  <thead><tr>
                    <th>материал</th>
                    <th>Размер листа</th>
                    ${hasRollFormat ? '<th>формат рулона</th>' : ''}
                    <th>гр/м2</th><th>тираж листов</th><th>факт листов</th>
                  </tr></thead>
                  <tbody><tr>
                    <td><strong>${order.paper_type || ''}</strong></td>
                    <td><strong>${sheetSizeFormatted}</strong></td>
                    ${hasRollFormat ? `<td><strong>${rollFormatFormatted}</strong></td>` : ''}
                    <td><strong>${gsmFormatted}</strong></td>
                    <td><strong>${displaySheetsFormatted}</strong></td>
                    <td></td>
                  </tr></tbody>
                </table>
              </div>
              <div class="section-title">${printLabel}</div>
              <div class="table-responsive">
                <table>
                  <thead>
                    <tr>
                      <th>Печатный формат</th><th>Красочность</th><th>тираж</th><th>приладка</th><th>ВД лак</th><th>Кол-во брака</th><th>Кол-во факта печати</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td><strong>${printSizeFormatted}</strong></td>
                      <td><strong>${order.color || ''}</strong></td>
                      <td><strong>${displaySheetsFormatted}</strong></td>
                      <td><strong>${makeReadyFormatted}</strong></td>
                      <td><strong>${serviceMap.vd_lak || ''}</strong></td>
                      <td></td>
                      <td></td>
                    </tr>
                  </tbody>
                </table>
              </div>
              ${techOpHTML}
              ${(order.pdf_filename || order.screenshot_base64) ? `
                <div class="section-title files-title">Файлы</div>
                <div class="file-block">
                  ${order.pdf_filename ? `<div class="file-row"><span class="label">Имя PDF:</span> <span class="pdf-name"><strong>${order.pdf_filename}</strong></span></div>` : ''}
                  ${order.screenshot_base64 ? `<div class="file-row"><span class="label">Скриншот:</span> <div class="screenshot-container"><img src="${order.screenshot_base64}" alt="Скриншот" onclick="event.stopPropagation(); document.getElementById('screenshotModal').classList.add('visible'); document.getElementById('modalImage').src='${order.screenshot_base64}';"></div></div>` : ''}
                </div>
              ` : ''}
            </div>
          </div>
        `;

        content.innerHTML = html;
        actionBar.style.display = 'flex';

        let filesVisible = true;
        const filesTitle = document.querySelector('.files-title');
        const fileBlock = document.querySelector('.file-block');
        toggleFilesBtn.textContent = '🖨️ Скрыть файлы';
        toggleFilesBtn.onclick = function() {
          filesVisible = !filesVisible;
          if (filesTitle) filesTitle.style.display = filesVisible ? '' : 'none';
          if (fileBlock) fileBlock.style.display = filesVisible ? '' : 'none';
          this.textContent = filesVisible ? '🖨️ Скрыть файлы' : '🖨️ Показать файлы';
        };

        printBtn.onclick = function() { window.print(); };

        downloadPdfBtn.onclick = function() {
          const element = document.getElementById('techCardContent');
          if (!element) return;
          html2canvas(element, { scale: 2, backgroundColor: '#ffffff', allowTaint: true, useCORS: true })
            .then(canvas => {
              const imgData = canvas.toDataURL('image/png');
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF('p', 'mm', 'a4');
              const pdfWidth = pdf.internal.pageSize.getWidth();
              const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
              let heightLeft = pdfHeight;
              let position = 0;
              pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
              heightLeft -= pdf.internal.pageSize.getHeight();
              while (heightLeft > 0) {
                position = heightLeft - pdfHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                heightLeft -= pdf.internal.pageSize.getHeight();
              }
              pdf.save(`Техкарта_${order.techcard_no || order.id}.pdf`);
            })
            .catch(err => { alert('Ошибка при создании PDF: ' + err.message); });
        };

        const modal = document.getElementById('screenshotModal');
        modal.onclick = function(e) {
          if (e.target === this) this.classList.remove('visible');
        };
      }

      if (orderId) {
        const orders = loadOrders();
        const order = orders.find(o => String(o.id) === String(orderId));
        if (!order) {
          content.innerHTML = `<div class="tech-card"><h2>Ошибка</h2><p>Заказ с ID ${orderId} не найден. <a href="texKarta.html">Вернуться к списку</a></p></div>`;
          actionBar.style.display = 'none';
          return;
        }
        renderTechCard(order);
        return;
      }

      const allOrders = loadOrders();
      window._originalOrders = allOrders.slice();

      function renderList(orders) {
        const tableContainer = document.getElementById('tableContainer');
        const cardsContainer = document.getElementById('techCardsContainer');
        if (!tableContainer || !cardsContainer) return;
        
        if (orders.length === 0) {
          tableContainer.innerHTML = `<div class="empty-msg">Нет заказов, соответствующих фильтру.</div>`;
          cardsContainer.innerHTML = `<div class="empty-msg">Нет заказов, соответствующих фильтру.</div>`;
          return;
        }
        orders.sort((a, b) => b.id - a.id);
        
        // Таблица для десктопа
        let tableRows = orders.map(o => `
          <tr onclick="window.location.href='texKarta.html?id=${o.id}'">
            <td><strong>${o.techcard_no || o.id}</strong></td>
            <td>${o.customer || ''}</td>
            <td>${o.product_name || ''}</td>
            <td>${o.manager || ''}</td>
            <td>${(o.order_qty || 0).toLocaleString('ru-RU')}</td>
            <td>${Math.ceil(o.print_sheets || 0).toLocaleString('ru-RU')}</td>
            <td><a href="texKarta.html?id=${o.id}" class="btn-link" onclick="event.stopPropagation()">Открыть</a></td>
          </tr>
        `).join('');
        tableContainer.innerHTML = `
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th>№ техкарты</th><th>Заказчик</th><th>Продукция</th><th>Менеджер</th><th>Кол-во</th><th>Тираж</th><th>Действие</th></tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        `;
        
        // Карточки для мобильных
        let cardsHTML = orders.map(o => `
          <div class="tech-card-item" onclick="window.location.href='texKarta.html?id=${o.id}'">
            <div class="tech-card-header">
              <div class="tech-card-no">№${o.techcard_no || o.id}</div>
            </div>
            <div class="tech-card-row">
              <span class="tech-card-label">Заказчик</span>
              <span class="tech-card-value">${o.customer || '—'}</span>
            </div>
            <div class="tech-card-row">
              <span class="tech-card-label">Продукция</span>
              <span class="tech-card-value">${o.product_name || '—'}</span>
            </div>
            <div class="tech-card-row">
              <span class="tech-card-label">Менеджер</span>
              <span class="tech-card-value">${o.manager || '—'}</span>
            </div>
            <div class="tech-card-row">
              <span class="tech-card-label">Кол-во</span>
              <span class="tech-card-value">${(o.order_qty || 0).toLocaleString('ru-RU')}</span>
            </div>
            <div class="tech-card-row">
              <span class="tech-card-label">Тираж</span>
              <span class="tech-card-value"><strong>${Math.ceil(o.print_sheets || 0).toLocaleString('ru-RU')}</strong></span>
            </div>
            <div class="tech-card-actions">
              <a href="texKarta.html?id=${o.id}" class="btn-link" onclick="event.stopPropagation()">📄 Открыть техкарту</a>
            </div>
          </div>
        `).join('');
        cardsContainer.innerHTML = cardsHTML;
      }

      window.applyFilters = function() {
        const searchVal = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
        let filtered = window._originalOrders || [];
        if (searchVal) {
          filtered = filtered.filter(o => {
            const fields = [o.techcard_no, o.customer, o.product_name, o.manager].map(f => String(f || '').toLowerCase());
            return fields.some(f => f.includes(searchVal));
          });
        }
        renderList(filtered);
      };

      function buildListPage() {
        const html = `
          <div class="tech-list">
            <h2>📋 Список техкарт (${allOrders.length})</h2>
            <div class="filter-bar" id="filterBar">
              <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по номеру, заказчику, продукции..." oninput="applyFilters()">
              </div>
            </div>
            <div id="tableContainer"></div>
            <div id="techCardsContainer" class="tech-cards"></div>
          </div>
        `;
        content.innerHTML = html;
        actionBar.style.display = 'none';
        renderList(allOrders);
      }

      if (allOrders.length === 0) {
        content.innerHTML = `
          <div class="tech-list">
            <h2>📋 Список техкарт</h2>
            <div class="empty-msg">Техкарт пока нет. Создайте заказ на странице <a href="otpCex.html">«Отправка в цех»</a>.</div>
          </div>
        `;
        actionBar.style.display = 'none';
        return;
      }

      buildListPage();
    });
  </script>
  <script src="js/auth-check.js"></script>
  <script src="js/nav-filter.js"></script>
</body>
</html>
