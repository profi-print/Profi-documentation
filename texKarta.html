<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Техкарта — ProfitPrint</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/texKarta.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* ============================================================
       ПРИНУДИТЕЛЬНАЯ СВЕТЛАЯ ТЕМА
       ============================================================ */
    :root {
      --bg-main: #f1f4f9;
      --bg-white: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --primary-blue: #2563eb;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --accent-red: #dc2626;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body.dark-theme,
    body[data-theme="dark"] {
      --bg-main: #f1f4f9 !important;
      --bg-white: #ffffff !important;
      --text-primary: #1e293b !important;
      --text-secondary: #64748b !important;
      --border-color: #e2e8f0 !important;
      --primary-blue: #2563eb !important;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08) !important;
      --accent-red: #dc2626 !important;
    }

    .theme-switch-wrapper {
      display: none !important;
    }

    /* ============================================================
       Стили для списка техкарт
       ============================================================ */
    .tech-list {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      max-width: 1200px;
      margin: 0 auto;
    }
    .tech-list h2 {
      margin: 0 0 16px 0;
      color: var(--text-primary);
      font-size: 20px;
      border-bottom: 2px solid var(--primary-blue);
      padding-bottom: 8px;
    }
    .tech-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .tech-list th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg-main);
      border-bottom: 2px solid var(--border-color);
      font-weight: 600;
      color: var(--text-secondary);
    }
    .tech-list td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    .tech-list tr:hover {
      background: var(--bg-main);
      cursor: pointer;
    }
    .tech-list .btn-link {
      padding: 4px 12px;
      border-radius: 6px;
      background: var(--primary-blue);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      border: none;
      cursor: pointer;
    }
    .tech-list .btn-link:hover {
      opacity: 0.85;
    }
    .tech-list .empty-msg {
      padding: 30px;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ============================================================
       Стили для отображения одной техкарты
       ============================================================ */
    .tech-card {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      max-width: 1000px;
      margin: 0 auto;
    }
    .tech-card h2 {
      margin: 0 0 16px 0;
      color: var(--text-primary);
      font-size: 22px;
      border-bottom: 2px solid var(--primary-blue);
      padding-bottom: 8px;
    }
    .tech-card .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-bottom: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .tech-card .info-label {
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 140px;
    }
    .tech-card .info-value {
      flex: 1;
      color: var(--text-primary);
    }
    .tech-card .section-title {
      font-weight: 700;
      font-size: 16px;
      margin: 20px 0 12px 0;
      color: var(--primary-blue);
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 4px;
    }
    .tech-card .service-item-display {
      background: var(--bg-main);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: inline-block;
      border: 1px solid var(--border-color);
    }
    .tech-card .screenshot-container {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
    }
    .tech-card .screenshot-container img {
      max-width: 300px;
      max-height: 300px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .tech-card .screenshot-container img:hover {
      transform: scale(1.02);
    }
    .tech-card .pdf-name {
      background: var(--bg-main);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      display: inline-block;
      font-family: monospace;
    }
    .tech-card .no-data {
      color: var(--text-secondary);
      font-style: italic;
    }
    .action-bar {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .additional-info {
      margin-top: 20px;
      padding: 16px;
      background: var(--bg-main);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      display: none;
    }
    .additional-info.visible {
      display: block;
    }
    .hidden-input {
      display: none;
    }
    /* Модалка для увеличения скриншота */
    .screenshot-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .screenshot-modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    .screenshot-modal.visible {
      display: flex;
    }
    .screenshot-modal .close-modal {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }

    /* Кнопка «Назад к списку» */
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo-small"><div class="logo-icon">PP</div><span>ProfitPrint</span></div>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html">📊 Главная</a></li>
        <li><a href="orders.html">📋 Заказы контрагентов</a></li>
        <li><a href="production.html">🏭 Заказы на производство</a></li>
        <li><a href="invoices.html">📦 Накладные</a></li>
        <li><a href="clients.html">👥 Контрагенты</a></li>
        <li><a href="products.html">📁 Продукты</a></li>
        <li><a href="reconciliations.html">📑 Акты сверки</a></li>
        <li><a href="backups.html">🗑️ Резервные копии</a></li>
        <li><a href="otpCex.html">⚙️ На производство</a></li>
        <li><a href="texKarta.html" class="active">⚙️ Техкарта</a></li>
      </ul>
      <div class="theme-switch-wrapper">
        <button id="themeToggle" class="btn btn-secondary" style="display:none;">
          <span id="themeIcon">🌙</span> <span id="themeLabel">Тёмная тема</span>
        </button>
      </div>
    </nav>

    <main class="main-content">
      <div class="top-bar">
        <h1>Технологическая карта</h1>
      </div>
      <div class="content-section">
        <div id="content">Загрузка...</div>
        <div id="actionBar" class="action-bar" style="display:none;">
          <button id="toggleInfoBtn" class="btn btn-secondary">📋 Дополнительная информация</button>
          <button id="downloadPdfBtn" class="btn btn-primary">📥 Скачать PDF техкарты</button>
          <button id="viewOfficePdfBtn" class="btn btn-secondary" style="display:none;">👁️ Посмотреть PDF</button>
          <button id="uploadLocalPdfBtn" class="btn btn-secondary">📤 Загрузить PDF</button>
        </div>
        <div id="additionalInfo" class="additional-info"></div>
        <input type="file" id="localPdfInput" accept=".pdf" class="hidden-input">
      </div>
    </main>
  </div>

  <!-- Модалка для просмотра скриншота -->
  <div id="screenshotModal" class="screenshot-modal" onclick="this.classList.remove('visible')">
    <span class="close-modal">&times;</span>
    <img id="modalImage" src="" alt="Скриншот">
  </div>

  <script>
    (function() {
      document.body.classList.remove('dark-theme', 'dark');
      document.body.removeAttribute('data-theme');
      document.documentElement.classList.remove('dark-theme', 'dark');
      document.documentElement.removeAttribute('data-theme');
    })();

    document.addEventListener('DOMContentLoaded', function() {
      const content = document.getElementById('content');
      const actionBar = document.getElementById('actionBar');
      const additionalInfo = document.getElementById('additionalInfo');
      const toggleInfoBtn = document.getElementById('toggleInfoBtn');
      const downloadPdfBtn = document.getElementById('downloadPdfBtn');
      const viewOfficePdfBtn = document.getElementById('viewOfficePdfBtn');
      const uploadLocalPdfBtn = document.getElementById('uploadLocalPdfBtn');
      const localPdfInput = document.getElementById('localPdfInput');

      // Получаем ID из URL
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');

      // Функция загрузки всех заказов из localStorage
      function loadOrders() {
        let orders = [];
        try {
          const raw = localStorage.getItem('pp_orders') || localStorage.getItem('print_orders');
          if (raw) orders = JSON.parse(raw);
        } catch (e) {
          console.error('Ошибка загрузки заказов:', e);
        }
        return orders;
      }

      // ---- Если есть ID – показываем одну техкарту ----
      if (orderId) {
        const orders = loadOrders();
        const order = orders.find(o => String(o.id) === String(orderId));

        if (!order) {
          content.innerHTML = `<div class="tech-card"><h2>Ошибка</h2><p>Заказ с ID ${orderId} не найден. <a href="texKarta.html">Вернуться к списку</a></p></div>`;
          return;
        }

        // Функция форматирования услуг
        function formatServices(services) {
          if (!services || !services.length) return '<span class="no-data">Нет</span>';
          const serviceNames = {
            vd_lak: 'ВД лак',
            lamination: 'Ламинация',
            embossing: 'Тиснение',
            cutting: 'Резка',
            gluing: 'Склейка',
            uv_lak: 'УФ лак',
            die_cut: 'Высечка',
            kongrev: 'Конгрев',
            flot_cutting: 'Флоторезка / Резка'
          };
          return services.map(s => {
            let label = serviceNames[s.name] || s.name;
            let details = '';
            if (s.name === 'cutting') {
              if (s.type === 'до печать') details = ` (до печать: ${s.length}×${s.width})`;
              else if (s.type === 'пост печать') details = ` (пост печать: ${s.length}×${s.width})`;
              else if (s.type === 'оба') {
                const pre = s.details ? s.details.find(d => d.type === 'до печать') : null;
                const post = s.details ? s.details.find(d => d.type === 'пост печать') : null;
                details = ` (до: ${pre ? pre.length+'×'+pre.width : '—'}, пост: ${post ? post.length+'×'+post.width : '—'})`;
              }
            } else if (s.name === 'flot_cutting') {
              details = ` (результат: ${s.result || 0})`;
            } else if (s.type && s.type !== '') {
              details = ` (${s.type})`;
            }
            return `<span class="service-item-display">${label}${details}</span>`;
          }).join(' ');
        }

        const cardHTML = `
          <div>
            <a href="texKarta.html" class="back-link">← Назад к списку</a>
            <div class="tech-card" id="techCardContent">
              <h2>Технологическая карта №${order.techcard_no || order.id}</h2>
              <div class="info-row">
                <span class="info-label">Менеджер:</span>
                <span class="info-value">${order.manager || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Заказчик:</span>
                <span class="info-value">${order.customer || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Продукция:</span>
                <span class="info-value">${order.product_name || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Описание:</span>
                <span class="info-value">${order.description || '—'}</span>
              </div>
              <div class="section-title">Печать</div>
              <div class="info-row">
                <span class="info-label">Формат:</span>
                <span class="info-value">${order.print_type || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Тип носителя:</span>
                <span class="info-value">${order.media_type === 'roll' ? 'Рулон' : order.media_type === 'sheet' ? 'Листовой' : '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Бумага:</span>
                <span class="info-value">${order.paper_type || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Количество заказа:</span>
                <span class="info-value">${order.order_qty || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Приладка:</span>
                <span class="info-value">${order.make_ready || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Размер (Д×Ш):</span>
                <span class="info-value">${order.size_length || 0} × ${order.size_width || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Полос:</span>
                <span class="info-value">${order.stripes || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">гр/м²:</span>
                <span class="info-value">${order.gsm || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Цвет:</span>
                <span class="info-value">${order.color || '—'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Тираж листов:</span>
                <span class="info-value">${order.print_sheets || 0}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Вес заказа:</span>
                <span class="info-value">${order.weight_kg ? order.weight_kg.toFixed(3).replace('.', ',') + ' кг' : '—'}</span>
              </div>

              ${order.roll_format ? `
                <div class="info-row">
                  <span class="info-label">Формат рулона:</span>
                  <span class="info-value">${order.roll_format}</span>
                </div>
              ` : ''}

              <div class="section-title">Услуги</div>
              <div class="info-row" style="flex-wrap: wrap; gap: 6px;">
                <span class="info-label" style="min-width:100%;">Пост‑печать:</span>
                <div style="display: flex; flex-wrap: wrap; gap: 6px; width:100%;">
                  ${formatServices(order.services)}
                </div>
              </div>

              <div class="section-title">Файлы</div>
              <div class="info-row">
                <span class="info-label">Имя PDF (офис):</span>
                <span class="info-value">${order.pdf_filename ? `<span class="pdf-name">${order.pdf_filename}</span>` : '<span class="no-data">не указан</span>'}</span>
              </div>
              <div class="info-row" style="flex-direction: column; align-items: flex-start;">
                <span class="info-label" style="margin-bottom: 8px;">Скриншот:</span>
                ${order.screenshot_base64 ? `
                  <div class="screenshot-container">
                    <img src="${order.screenshot_base64}" alt="Скриншот" onclick="document.getElementById('screenshotModal').classList.add('visible'); document.getElementById('modalImage').src='${order.screenshot_base64}';">
                  </div>
                ` : '<span class="no-data">не загружен</span>'}
              </div>
            </div>
          </div>
        `;

        content.innerHTML = cardHTML;
        actionBar.style.display = 'flex';

        // Дополнительная информация (детали)
        let infoVisible = false;
        toggleInfoBtn.addEventListener('click', function() {
          infoVisible = !infoVisible;
          additionalInfo.classList.toggle('visible', infoVisible);
          if (infoVisible) {
            additionalInfo.innerHTML = `
              <h4>Детали заказа</h4>
              <pre style="white-space: pre-wrap; background: var(--bg-white); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);">${JSON.stringify(order, null, 2)}</pre>
            `;
          }
        });

        // Скачать PDF техкарты
        downloadPdfBtn.addEventListener('click', function() {
          const element = document.getElementById('techCardContent');
          if (!element) return;
          html2canvas(element, {
            scale: 2,
            backgroundColor: '#ffffff',
            allowTaint: true,
            useCORS: true
          }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            let heightLeft = pdfHeight;
            let position = 0;

            pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
            heightLeft -= pdf.internal.pageSize.getHeight();

            while (heightLeft > 0) {
              position = heightLeft - pdfHeight;
              pdf.addPage();
              pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
              heightLeft -= pdf.internal.pageSize.getHeight();
            }
            pdf.save(`Техкарта_${order.techcard_no || order.id}.pdf`);
          }).catch(err => {
            alert('Ошибка при создании PDF: ' + err.message);
          });
        });

        // Посмотреть PDF (офисный)
        viewOfficePdfBtn.addEventListener('click', function() {
          if (order.pdf_filename) {
            alert(`PDF-файл "${order.pdf_filename}" находится на сервере. Для просмотра откройте его вручную.`);
          } else {
            alert('PDF-файл не указан.');
          }
        });

        // Загрузить локальный PDF
        uploadLocalPdfBtn.addEventListener('click', function() {
          localPdfInput.click();
        });
        localPdfInput.addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (file) {
            alert(`Выбран файл: ${file.name}`);
          }
          this.value = '';
        });

        const modal = document.getElementById('screenshotModal');
        modal.addEventListener('click', function(e) {
          if (e.target === this) this.classList.remove('visible');
        });

        return; // Конец обработки одной карты
      }

      // ---- Если ID нет – показываем список всех техкарт ----
      const orders = loadOrders();

      if (orders.length === 0) {
        content.innerHTML = `
          <div class="tech-list">
            <h2>📋 Список техкарт</h2>
            <div class="empty-msg">Техкарт пока нет. Создайте заказ на странице <a href="otpCex.html">«Отправка в цех»</a>.</div>
          </div>
        `;
        actionBar.style.display = 'none';
        return;
      }

      // Сортируем по дате (новые сверху) – используем id как временную метку
      orders.sort((a, b) => b.id - a.id);

      let tableRows = orders.map(o => `
        <tr onclick="window.location.href='texKarta.html?id=${o.id}'">
          <td><strong>${o.techcard_no || o.id}</strong></td>
          <td>${o.customer || '—'}</td>
          <td>${o.product_name || '—'}</td>
          <td>${o.manager || '—'}</td>
          <td>${o.order_qty || 0}</td>
          <td>${o.print_sheets || 0}</td>
          <td>
            <a href="texKarta.html?id=${o.id}" class="btn-link">Открыть</a>
          </td>
        </tr>
      `).join('');

      const listHTML = `
        <div class="tech-list">
          <h2>📋 Список техкарт (${orders.length})</h2>
          <table>
            <thead>
              <tr>
                <th>№ техкарты</th>
                <th>Заказчик</th>
                <th>Продукция</th>
                <th>Менеджер</th>
                <th>Кол-во</th>
                <th>Тираж</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        </div>
      `;

      content.innerHTML = listHTML;
      actionBar.style.display = 'none';
    });
  </script>
  <script src="js/auth-check.js"></script>
  <script src="js/nav-filter.js"></script>
</body>
</html>
